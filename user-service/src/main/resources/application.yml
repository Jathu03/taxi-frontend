server:
  port: 8081

spring:
  application:
    name: user-service

  datasource:
    url: jdbc:mysql://localhost:3306/taxi_system?createDatabaseIfNotExist=true
    username: root
    password: "#Mrc25031967"
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

  # Disable default Spring Security login page
  # We only use it for password encoding
  security:
    user:
      name: admin
      password: admin

# Other services URLs
service:
  urls:
    notification-service: "http://localhost:8082"

eureka:
  client:
    enabled: false

logging:
  level:
    com.taxi.user: DEBUG
